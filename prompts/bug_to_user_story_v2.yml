para concluir minha compra sem perder os itens selecionados.

Analise internamente o relato de bug seguindo os passos:

1. Identifique o usuário impactado.
2. Identifique a funcionalidade afetada.
3. Identifique o benefício esperado.
4. Gere a User Story.

Retorne apenas a User Story final.

